services:
  db:
    container_name: safiro_postgres
    restart: always
    image: docker.arvancloud.ir/postgres:17-alpine
    expose:
      - 5432
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTDB_PASSWORD}
      POSTGRES_DB: ${POSTDB_NAME}
      POSTGRES_USER: ${POSTDB_USER}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTDB_USER}", "-d", "${POSTDB_NAME}"]
      interval: 20s
      timeout: 5s
      retries: 2
      start_period: 20s

  redis:
    container_name: safiro_redis
    image: docker.arvancloud.ir/redis:8-alpine
    command: >
      redis-server
      --loglevel warning
      --appendonly no
      --save ""
      --maxmemory 1000mb
      --maxmemory-policy allkeys-lru
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 2
      start_period: 20s

  auth-backend:
    container_name: safiro_django
    restart: always
    volumes:
      - static_files:/home/app/staticfiles
    build:
      context: .
      dockerfile: dockerfile/prod/django/Dockerfile
    expose:
      - 8000
    env_file: ".env"
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

  nginx:
    container_name: safiro_nginx
    restart: always
    build:
      context: .
      dockerfile: dockerfile/prod/nginx/Dockerfile
    ports:
      - "443:443"
      - "80:80"
    expose:
      - 80
      - 443
    depends_on:
      auth-backend:
        condition: service_started
    volumes:
      - static_files:/var/www/static
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/ssl:/etc/ssl:ro

  passenger:
    container_name: next_passenger
    image: next_passenger:1.0.0
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.safiro.ir/v1
      PORT: 3000
    expose:
      - 3000
    depends_on:
      nginx:
        condition: service_started

volumes:
  postgres_volume:
  static_files:
#  letsencrypt_etc:
#  letsencrypt_var_lib:
#  certbot_www: