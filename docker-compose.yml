services:
  db:
    container_name: safiro_postgres
    env_file: "postdb.env"
    restart: always
    image: docker.arvancloud.ir/postgres:18-alpine
    ports:
      - "5432:5432"
    expose:
      - 5432
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTDB_PASSWORD}
      - POSTDB_NAME=${POSTDB_NAME}
      - POSTDB_USER=${POSTDB_USER}

  redis:
    container_name: safiro_redis
    image: docker.arvancloud.ir/redis:latest
    command: >
      redis-server
      --loglevel warning
      --appendonly no
      --save ""
      --maxmemory 1000mb
      --maxmemory-policy allkeys-lru
    expose:
      - 6379
    ports:
      - "6379:6379"

  auth-backend:
    container_name: safiro
    restart: always
    volumes:
      - static_files:/home/app/static
    build:
      context: .
      dockerfile: dockerfile/prod/Dockerfile
    ports:
      - "8000:8000"
    expose:
      - 8000
    env_file: ".env"

  nginx:
    container_name: safiro_nginx
    restart: always
    build:
      context: .
      dockerfile: dockerfile/prod/nginx/Dockerfile
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - static_files:/var/www/static
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_volume:
  static_files:
#  letsencrypt_etc:
#  letsencrypt_var_lib:
#  certbot_www: