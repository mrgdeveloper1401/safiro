user www-data;
worker_processes auto;

error_log /var/log/nginx/main_error.log warn buffer=2049k;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    client_max_body_size 3M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;

    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;

    proxy_read_timeout 30;
    proxy_request_buffering on;

    # basic settings
    include /etc/nginx/mime.types;

    # log format in console
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    # access log format
    access_log /var/log/nginx/access.log main buffer=2049k flush=60s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # compressor
    gzip on;
    gzip_types
        # انواع پایه متنی
        text/plain
        text/css
        text/xml
        text/javascript
        text/html
        text/markdown
        text/csv

        # JSON APIs - برای DRF و drf-spectacular
        application/json
        application/ld+json
        application/vnd.api+json
        application/openapi+json
        application/swagger+json
        application/schema+json

        # JavaScript - برای Django Admin و static files
        application/javascript
        application/x-javascript

        # XML و feeds
        application/xml
        application/xml+rss
        application/atom+xml
        application/rss+xml

        # Django Admin و HTML
        application/xhtml+xml

        # فونت‌ها - برای Whitenoise و static files
        font/woff
        font/woff2
        font/ttf
        font/otf
        application/font-woff
        application/font-woff2
        application/x-font-ttf
        application/vnd.ms-fontobject

        # برای drf-spectacular-sidecar (Swagger UI)
        application/manifest+json
        application/webmanifest+json

        # سایر انواع
        application/yaml
        text/yaml
        application/x-yaml
        text/vtt
        application/vnd.ms-excel;

    gzip_min_length 1000; # فقط فایل‌های بزرگ‌تر از 1KB فشرده شوند
    gzip_comp_level 5; # level compressor

    server {
        listen 80;
        server_name api.safiro.ir;
        return 301 https://$host$request_uri;
    }

    # config app
    server {
        listen 443 quic reuseport;
        listen 443 ssl;
        server_name api.safiro.ir;

        ssl_certificate /etc/letsencrypt/live/api.safiro.ir/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.safiro.ir/privkey.pem;
        ssl_session_cache shared:le_nginx_SSL:10m;
        ssl_session_timeout 24h;
        ssl_buffer_size 4k;
        ssl_ecdh_curve X25519:secp384r1:prime256v1;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";

        # 🆕 Security Headers
#         add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
#         add_header X-Frame-Options "SAMEORIGIN" always;
#         add_header X-Content-Type-Options "nosniff" always;
#         add_header X-XSS-Protection "1; mode=block" always;
#         add_header Referrer-Policy "strict-origin-when-cross-origin" always;
#         add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        add_header Alt-Svc 'h3=":443"; ma=86400, h3-29=":443"; ma=86400' always;

        location /static/ {
            alias /var/www/static/;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            proxy_pass http://safiro_django:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }
    }
}