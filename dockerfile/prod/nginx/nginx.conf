user nginx;
worker_processes auto;

error_log /var/log/nginx/main_error.log error;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on; # accept multi connection
    accept_mutex on; # set to in if nginx worker_proccess > 1
}

http {
     # request body
    client_max_body_size 10M;
    client_body_buffer_size 256k;

    # timeout
    client_body_timeout 120;
    client_header_timeout 120;
    send_timeout 60;
    proxy_connect_timeout 20s; # max time connect nginx into backend
    proxy_send_timeout 120s; # max time send send data, from nginx into backend
    proxy_read_timeout 120s; # max time send data, from backend into nginx

    # basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # proxy settings
    proxy_buffering on; # get backend response after save in buffer afetr send into client
    proxy_request_buffering on; # get all file after send into backend
    proxy_buffer_size 8k; # first bufer size for send response into backend
    proxy_buffers 16 32k; # how many buffer number and buffer size (16 * 32 = 512), save 512kb response backend into memory
    proxy_busy_buffers_size 64k; # send buffer size into cleint

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    # access log format
    access_log /var/log/nginx/access.log main buffer=32k flush=10s;

    # Performance Optimizations
    sendfile on; # send file directly from dist into network
    tcp_nopush on; # send all packet (for big request)
    tcp_nodelay on; # send delivery packaet (for small request)
    sendfile_max_chunk 1m;

    # keepalive
    keepalive_timeout 5; # open connection tcp with 5 second
    keepalive_requests 1000; # max number of request in connection

    # compressor
    gzip on;
    gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    text/markdown
    text/csv
    application/json
    application/ld+json
    application/vnd.api+json
    application/openapi+json
    application/swagger+json
    application/schema+json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/atom+xml
    application/rss+xml
    application/xhtml+xml
    application/font-woff
    application/font-woff2
    application/x-font-ttf
    application/vnd.ms-fontobject
    application/manifest+json
    application/webmanifest+json
    application/yaml
    text/yaml
    application/x-yaml
    text/vtt;

    gzip_min_length 1000; # compress responses larger then 1000 bytes
    gzip_comp_level 5; # level compressor
    gzip_vary on;
    gzip_proxied any; # compress request if request in proxy or cdn
    gzip_buffers 16 16k; # memory for used gzip
    gzip_http_version 1.1; # enable gzip in http 1.1

    server {
        listen 80;
        server_name safiro.ir;
        return 301 https://$host$request_uri;
    }

    upstream djangoApp{
        server safiro_django:8000;
        keepalive 64; # for 2 core ==> 128 connection
    }

    # config app
    server {
        server_name safiro.ir;
        listen 443 quic reuseport;
        listen 443 ssl;
        http2 on;

        # ssl key
        ssl_certificate /etc/ssl/certs/selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/selfsigned.key;

        # options-ssl-nginx
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # volume encrypt data
        ssl_buffer_size 8k;

        add_header Alt-Svc 'h3=":443"; ma=86400, h3-29=":443"; ma=86400' always;

        location /static/ {
            alias /var/www/static/;
            add_header Cache-Control "public, immutable";
            access_log off;
            expires 30d;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # clinet info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            #send real protocol
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;

            # compatibility
            proxy_set_header X-Scheme $scheme;

            # prevent duplicate send header
            proxy_set_header Early-Data $ssl_early_data;

            # redirects we set the host: header above already
            proxy_redirect off;

            # close connection if user disconnect connecton
            proxy_ignore_client_abort off;

            # send into backend
            proxy_pass http://djangoApp;
        }
    }
}
