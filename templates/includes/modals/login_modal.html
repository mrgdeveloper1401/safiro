<!-- includes/modals/login_modal.html -->
{% load static %}

<div
  id="login-modal"
  class="fixed inset-0 bg-black bg-opacity-40 backdrop-blur-sm z-50 hidden items-center justify-center transition-all duration-300"
  onclick="closeModalOnOutsideClick(event, 'login-modal')"
>
  <div
    class="bg-linear-to-br from-white to-gray-50 rounded-2xl shadow-2xl w-full max-w-md mx-4 relative transform transition-all duration-300 scale-95 opacity-0 animate-modal-in"
    onclick="event.stopPropagation()"
  >
    <!-- دکمه بستن با استایل دایره‌ای -->
    <button
      onclick="closeModal('login-modal')"
      class="absolute -top-3 -left-3 w-8 h-8 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg transition-all duration-200 hover:scale-110 z-10"
    >
      <svg
        class="w-4 h-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        ></path>
      </svg>
    </button>

    <!-- هدر مودال با آیکون -->
    <div
      class="border-b border-gray-200 p-6 text-center bg-linear-to-r from-blue-50 to-indigo-50 rounded-t-2xl"
    >
      <div
        class="w-16 h-16 bg-linear-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg"
      >
        <svg
          class="w-8 h-8 text-white"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          ></path>
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-800">خوش آمدید</h2>
      <p class="text-gray-600 mt-1 text-sm">
        برای ادامه لطفا وارد شوید یا ثبت نام کنید
      </p>
    </div>

    <!-- محتوای مودال -->
    <div class="p-6">
      <!-- تب‌ها با استایل زیباتر -->
      <div class="flex bg-gray-100 rounded-lg p-1 mb-6">
        <button
          onclick="switchTab('login')"
          id="login-tab"
          class="flex-1 py-2.5 text-center font-semibold rounded-md transition-all duration-200 bg-white text-blue-600 shadow-sm"
        >
          ورود
        </button>
        <button
          onclick="switchTab('register')"
          id="register-tab"
          class="flex-1 py-2.5 text-center font-semibold rounded-md transition-all duration-200 text-gray-600 hover:text-gray-800"
        >
          ثبت نام
        </button>
      </div>

      <!-- فرم ورود -->
      <form id="login-form" action="" method="post" class="space-y-4">
        {% csrf_token %}
        <div class="group">
          <label class="block text-gray-700 text-sm font-semibold mb-2"
            >شماره موبایل یا ایمیل</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"
            >
              <svg
                class="h-5 w-5 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
                ></path>
              </svg>
            </div>
            <input
              type="text"
              name="username"
              required
              class="w-full border border-gray-300 rounded-lg px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
            />
          </div>
        </div>
        <div class="group">
          <label class="block text-gray-700 text-sm font-semibold mb-2"
            >رمز عبور</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"
            >
              <svg
                class="h-5 w-5 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                ></path>
              </svg>
            </div>
            <input
              type="password"
              name="password"
              required
              class="w-full border border-gray-300 rounded-lg px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
            />
          </div>
        </div>
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center">
            <input
              type="checkbox"
              class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
            />
            <span class="mr-2 text-gray-600">مرا به خاطر بسپار</span>
          </label>
          <a href="#" class="text-blue-600 hover:text-blue-700 font-semibold"
            >رمز عبور را فراموش کرده‌ام؟</a
          >
        </div>
        <button
          type="submit"
          class="w-full bg-linear-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-indigo-700 transition-all duration-200 transform hover:scale-105 shadow-md"
        >
          ورود به حساب کاربری
        </button>
      </form>

      <!-- فرم ثبت نام -->
      <form id="register-form" action="" method="post" class="space-y-4 hidden">
        {% csrf_token %}
        <div></div>
        <div>
          <label class="block text-gray-700 text-sm font-semibold mb-2"
            >شماره موبایل</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"
            >
              <svg
                class="h-5 w-5 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"
                ></path>
              </svg>
            </div>
            <input
              type="tel"
              name="phone"
              required
              class="w-full border border-gray-300 rounded-lg px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            />
          </div>
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-semibold mb-2"
            >رمز عبور</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"
            >
              <svg
                class="h-5 w-5 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                ></path>
              </svg>
            </div>
            <input
              type="password"
              name="password"
              required
              class="w-full border border-gray-300 rounded-lg px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            />
          </div>
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-semibold mb-2"
            >تکرار رمز عبور</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"
            >
              <svg
                class="h-5 w-5 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                ></path>
              </svg>
            </div>
            <input
              type="password"
              name="confirm_password"
              required
              class="w-full border border-gray-300 rounded-lg px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            />
          </div>
        </div>
        <button
          type="submit"
          class="w-full bg-linear-to-r from-green-600 to-emerald-600 text-white py-3 rounded-lg font-semibold hover:from-green-700 hover:to-emerald-700 transition-all duration-200 transform hover:scale-105 shadow-md"
        >
          ثبت نام کنید
        </button>
      </form>

      <!-- خط جداکننده با متن "یا" -->
      {% comment %}
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">یا از طریق</span>
        </div>
      </div>
      {% endcomment %}

      <!-- دکمه‌های اجتماعی -->
      {% comment %}
      <div class="grid">
        <button
          class="flex items-center justify-center gap-2 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-all duration-200"
        >
          <svg
            class="w-5 h-5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
          >
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4"
            />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853"
            />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05"
            />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335"
            />
          </svg>
          <span>Google</span>
        </button>
        {% endcomment %} {% comment %}
        <button
          class="flex items-center justify-center gap-2 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-all duration-200"
        >
          <svg
            class="w-5 h-5 text-blue-600"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
            />
          </svg>
          <span>Facebook</span>
        </button>
        {% endcomment %}
      </div>
    </div>
  </div>
</div>

<style>
  @keyframes modalIn {
    from {
      opacity: 0;
      transform: scale(0.95);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  .animate-modal-in {
    animation: modalIn 0.2s ease-out forwards;
  }

  /* اسکرول بار سفارشی */
  .custom-scroll::-webkit-scrollbar {
    width: 6px;
  }

  .custom-scroll::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
  }

  .custom-scroll::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 10px;
  }

  .custom-scroll::-webkit-scrollbar-thumb:hover {
    background: #555;
  }
</style>

<script>
  function switchTab(tab) {
    const loginForm = document.getElementById("login-form");
    const registerForm = document.getElementById("register-form");
    const loginTab = document.getElementById("login-tab");
    const registerTab = document.getElementById("register-tab");

    if (tab === "login") {
      loginForm.classList.remove("hidden");
      registerForm.classList.add("hidden");
      loginTab.classList.add("bg-white", "text-blue-600", "shadow-sm");
      loginTab.classList.remove("text-gray-600");
      registerTab.classList.remove("bg-white", "text-blue-600", "shadow-sm");
      registerTab.classList.add("text-gray-600");
    } else {
      loginForm.classList.add("hidden");
      registerForm.classList.remove("hidden");
      registerTab.classList.add("bg-white", "text-blue-600", "shadow-sm");
      registerTab.classList.remove("text-gray-600");
      loginTab.classList.remove("bg-white", "text-blue-600", "shadow-sm");
      loginTab.classList.add("text-gray-600");
    }
  }

  // بستن با کلید Escape
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      const modal = document.getElementById("login-modal");
      if (modal && !modal.classList.contains("hidden")) {
        closeModal("login-modal");
      }
    }
  });

  // دریافت CSRF token از کوکی
  function getCSRFToken() {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
      const cookies = document.cookie.split(";");
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, 10) === "csrftoken=") {
          cookieValue = decodeURIComponent(cookie.substring(10));
          break;
        }
      }
    }
    return cookieValue;
  }
</script>
