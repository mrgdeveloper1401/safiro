<!-- templates/driver.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}پنل راننده - سفیرو{% endblock %}

{% block header %}{% endblock header %}

{% block content %}
<div class="min-h-screen bg-linear-to-br from-gray-50 to-gray-100 py-8">
    <div class="container mx-auto px-4">
        
        <!-- دکمه بازگشت -->
        <div class="mb-6">
            <a href="/" class="inline-flex items-center text-gray-600 hover:text-blue-600 transition-colors">
                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"></path>
                </svg>
                بازگشت به صفحه اصلی
            </a>
        </div>

        <div id="driver-panel-container">
            <!-- محتوا توسط جاوااسکریپت بارگذاری می‌شود -->
            <div class="flex justify-center items-center h-64">
                <div class="text-center">
                    <svg class="animate-spin h-12 w-12 text-blue-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="text-gray-600">در حال بارگذاری اطلاعات...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ========== تنظیمات پایه ==========
const DRIVER_API_BASE = 'http://localhost:8000/v1/api/auth';
let currentDriver = null;
let currentDriverId = null;
let wsConnection = null;

// ========== توابع اصلی ==========
async function loadDriverPanel() {
    const token = localStorage.getItem('access_token');
    if (!token) {
        // window.location.href = '/';
        // return;
    }
    
    try {
        // بررسی وضعیت راننده
        const driverResponse = await fetch(`${DRIVER_API_BASE}/driver/`, {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
            }
        });
        
        const driverData = await driverResponse.json();
        
        if (!driverData.success || !driverData.result) {
            // اگر راننده نیست، به صفحه پروفایل برگردد
            window.location.href = '/auth/profile/';
            return;
        }
        
        currentDriver = driverData.result;
        currentDriverId = currentDriver.id;
        
        // دریافت اطلاعات خودرو
        await loadDriverCar();
        
        // دریافت مدارک
        await loadDriverDocuments();
        
        // رندر پنل
        renderDriverPanel();
        
        // اتصال WebSocket برای درخواست‌های لحظه‌ای
        connectWebSocket();
        
    } catch (error) {
        console.error('Error loading driver panel:', error);
        document.getElementById('driver-panel-container').innerHTML = `
            <div class="bg-red-50 border border-red-200 rounded-2xl p-8 text-center">
                <svg class="w-16 h-16 text-red-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <h3 class="text-xl font-bold text-gray-800 mb-2">خطا در بارگذاری اطلاعات</h3>
                <p class="text-gray-600">لطفا دوباره تلاش کنید</p>
                <button onclick="loadDriverPanel()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg">تلاش مجدد</button>
            </div>
        `;
    }
}

async function loadDriverCar() {
    try {
        const token = localStorage.getItem('access_token');
        const response = await fetch(`${DRIVER_API_BASE}/driver/${currentDriverId}/driver_car/`, {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
            }
        });
        
        const data = await response.json();
        if (data.results && data.results.length > 0) {
            currentDriver.car = data.results[0];
        }
    } catch (error) {
        console.error('Error loading driver car:', error);
    }
}

async function loadDriverDocuments() {
    try {
        const token = localStorage.getItem('access_token');
        const response = await fetch(`${DRIVER_API_BASE}/driver/${currentDriverId}/driver_doc/`, {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
            }
        });
        
        const data = await response.json();
        if (data.results) {
            currentDriver.documents = data.results;
        }
    } catch (error) {
        console.error('Error loading driver documents:', error);
    }
}

function connectWebSocket() {
    // WebSocket connection for real-time ride requests
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${window.location.host}/ws/driver/${currentDriverId}/`;
    
    wsConnection = new WebSocket(wsUrl);
    
    wsConnection.onmessage = function(event) {
        const data = JSON.parse(event.data);
        if (data.type === 'new_ride_request') {
            showRideRequestNotification(data.ride);
        }
    };
    
    wsConnection.onerror = function(error) {
        console.error('WebSocket error:', error);
    };
}

// ========== رندر پنل راننده ==========
function renderDriverPanel() {
    const container = document.getElementById('driver-panel-container');
    const verificationStatus = currentDriver.verification_status;
    const isVerified = verificationStatus === 'VERIFIED';
    const isPending = verificationStatus === 'PENDING';
    const isRejected = verificationStatus === 'REJECTED';
    
    let statusBadge = '';
    if (isVerified) {
        statusBadge = '<span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm">✓ تایید شده</span>';
    } else if (isPending) {
        statusBadge = '<span class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-sm">⏳ در انتظار تایید</span>';
    } else if (isRejected) {
        statusBadge = '<span class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-sm">✗ رد شده</span>';
    } else {
        statusBadge = '<span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm">📝 تکمیل نشده</span>';
    }
    
    let html = `
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- سایدبار منو -->
            <div class="lg:w-80">
                <div class="bg-white rounded-2xl shadow-lg overflow-hidden sticky top-8">
                    <!-- هدر پروفایل -->
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-center">
                        <div class="relative inline-block">
                            ${currentDriver.image ? `
                                <img src="${currentDriver.image}" alt="profile" class="w-24 h-24 rounded-full border-4 border-white shadow-lg mx-auto object-cover">
                            ` : `
                                <div class="w-24 h-24 rounded-full border-4 border-white shadow-lg mx-auto bg-white/20 flex items-center justify-center">
                                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                    </svg>
                                </div>
                            `}
                        </div>
                        <h2 class="text-xl font-bold text-white mt-3">
                            ${currentDriver.user?.first_name || currentDriver.user?.phone || 'راننده'}
                        </h2>
                        <p class="text-blue-100 text-sm mt-1">${currentDriver.user?.phone || ''}</p>
                        <div class="mt-3">${statusBadge}</div>
                    </div>
                    
                    <!-- منوهای اصلی -->
                    <div class="p-4">
                        <nav class="space-y-2">
                            <button onclick="showDriverSection('dashboard')" id="driver-btn-dashboard" class="driver-menu-btn w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg bg-blue-50 text-blue-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                                </svg>
                                <span>🏠 داشبورد</span>
                            </button>
                            
                            <button onclick="showDriverSection('ride-requests')" id="driver-btn-ride-requests" class="driver-menu-btn w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg text-gray-600 hover:bg-gray-50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"></path>
                                </svg>
                                <span>🚗 درخواست‌های سفر</span>
                                <span id="request-badge" class="hidden mr-auto px-2 py-0.5 bg-red-500 text-white text-xs rounded-full"></span>
                            </button>
                            
                            <button onclick="showDriverSection('active-ride')" id="driver-btn-active-ride" class="driver-menu-btn w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg text-gray-600 hover:bg-gray-50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                </svg>
                                <span>🔄 سفر فعال</span>
                            </button>
                            
                            <button onclick="showDriverSection('trip-history')" id="driver-btn-trip-history" class="driver-menu-btn w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg text-gray-600 hover:bg-gray-50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path>
                                </svg>
                                <span>📋 تاریخچه سفرها</span>
                            </button>
                            
                            <button onclick="showDriverSection('earnings')" id="driver-btn-earnings" class="driver-menu-btn w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg text-gray-600 hover:bg-gray-50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <span>💰 درآمد و آمار</span>
                            </button>
                            
                            <button onclick="showDriverSection('car-info')" id="driver-btn-car-info" class="driver-menu-btn w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg text-gray-600 hover:bg-gray-50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                                </svg>
                                <span>🚙 اطلاعات خودرو</span>
                            </button>
                            
                            <button onclick="showDriverSection('documents')" id="driver-btn-documents" class="driver-menu-btn w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg text-gray-600 hover:bg-gray-50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                                <span>📄 مدارک</span>
                            </button>
                            
                            <hr class="my-4">
                            
                            <button onclick="toggleOnlineStatus()" id="online-toggle-btn" class="w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.07 0a5 5 0 010 7.07M12 15a3 3 0 100-6 3 3 0 000 6z"></path>
                                </svg>
                                <span id="online-status-text">آفلاین</span>
                            </button>
                            
                            <hr class="my-4">
                            
                            <button onclick="goToProfile()" class="w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg text-gray-600 hover:bg-gray-50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                                <span>پروفایل اصلی</span>
                            </button>
                            
                            <button onclick="logoutUser()" class="w-full flex items-center gap-3 px-4 py-3 text-right rounded-lg text-red-600 hover:bg-red-50 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                </svg>
                                <span>خروج از حساب</span>
                            </button>
                        </nav>
                    </div>
                </div>
            </div>
            
            <!-- محتوای اصلی -->
            <div class="flex-1">
                ${renderDashboard()}
                ${renderRideRequests()}
                ${renderActiveRide()}
                ${renderTripHistory()}
                ${renderEarnings()}
                ${renderCarInfo()}
                ${renderDocuments()}
            </div>
        </div>
    `;
    
    container.innerHTML = html;
    
    // تنظیم وضعیت آنلاین/آفلاین
    updateOnlineStatusUI();
}

            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">داشبورد راننده</h3>
                
                <!-- کارت‌های آماری -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl p-6 text-white">
                        <div class="flex items-center justify-between mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>

                    <div class="bg-gradient-to-r from-green-500 to-green-600 rounded-xl p-6 text-white">
                        <div class="flex items-center justify-between mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>

                        </div>
                        <p class="text-sm opacity-90">درآمد امروز (تومان)</p>
                    </div>
                    
                    <div class="bg-gradient-to-r from-purple-500 to-purple-600 rounded-xl p-6 text-white">
                        <div class="flex items-center justify-between mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
                            </svg>
                            <span class="text-3xl font-bold" id="total-rides">0</span>
                        </div>
                        <p class="text-sm opacity-90">کل سفرها</p>
                    </div>
                    
                    <div class="bg-gradient-to-r from-orange-500 to-orange-600 rounded-xl p-6 text-white">
                        <div class="flex items-center justify-between mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                            <span class="text-3xl font-bold" id="rating">5.0</span>

                    </div>
                </div>
                
                <!-- وضعیت تایید حساب -->
                <div class="bg-gray-50 rounded-xl p-6">
                    <h4 class="font-semibold text-gray-800 mb-4">وضعیت حساب راننده</h4>
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-600">وضعیت تایید: ${currentDriver.verification_status === 'VERIFIED' ? 'تایید شده' : currentDriver.verification_status === 'PENDING' ? 'در انتظار تایید' : 'تکمیل نشده'}</p>

function renderActiveRide() {

                <h3 class="text-2xl font-bold text-gray-800 mb-6">سفر فعال</h3>

}

function renderTripHistory() {
    return `
        <div id="driver-trip-history-section" class="driver-section-content hidden">
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">تاریخچه سفرها</h3>
                <div id="trip-history-list" class="space-y-4">
                    <div class="text-center text-gray-500 py-8">
                        <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">

function renderDocuments() {
    const docs = currentDriver.documents || [];
    const docStatus = {
        'id_front': 'جلوی کارت ملی',
        'id_back': 'پشت کارت ملی',
        'car_front': 'جلوی خودرو',
        'car_back': 'پشت خودرو',
        'insurance': 'بیمه نامه',
        'fuel_card': 'کارت سوخت'
    };
    
    let docsHtml = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
    for (const [key, label] of Object.entries(docStatus)) {
        const doc = docs.find(d => d.doc_type === key);
        const isVerified = doc?.is_verified;
        
        docsHtml += `
            <div class="border rounded-xl p-4">
                <div class="flex justify-between items-center mb-3">
                    <span class="font-semibold text-gray-800">${label}</span>
                    ${isVerified ? 
                        '<span class="text-green-600 text-sm">✓ تایید شده</span>' : 
                        '<span class="text-yellow-600 text-sm">⏳ در انتظار تایید</span>'}
                </div>
                ${doc?.image ? 
                    `<img src="${doc.image}" alt="${label}" class="w-full h-32 object-cover rounded-lg cursor-pointer" onclick="window.open('${doc.image}', '_blank')">` :
                    '<div class="bg-gray-100 rounded-lg p-4 text-center text-gray-500">تصویری آپلود نشده است</div>'
                }
            </div>
        `;
    }
    docsHtml += '</div>';
    
    return `
        <div id="driver-documents-section" class="driver-section-content hidden">
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">مدارک</h3>
                <div class="mb-4 p-3 bg-blue-50 rounded-lg">
                    <p class="text-sm text-blue-800">مدارک شما پس از آپلود توسط تیم پشتیبانی بررسی و تایید می‌شود.</p>
                </div>
                ${docsHtml}
            </div>
        </div>
    `;
}

// ========== توابع کنترلی ==========
function showDriverSection(sectionName) {
    document.querySelectorAll('.driver-section-content').forEach(section => {
        section.classList.add('hidden');
    });
    const targetSection = document.getElementById(`driver-${sectionName}-section`);
    if (targetSection) {
        targetSection.classList.remove('hidden');
    }
    
    document.querySelectorAll('.driver-menu-btn').forEach(btn => {
        btn.classList.remove('bg-blue-50', 'text-blue-600');
        btn.classList.add('text-gray-600');
    });
    const activeBtn = document.getElementById(`driver-btn-${sectionName}`);
    if (activeBtn) {
        activeBtn.classList.add('bg-blue-50', 'text-blue-600');
        activeBtn.classList.remove('text-gray-600');
    }
    
    // بارگذاری دیتاهای هر بخش
    if (sectionName === 'ride-requests') {
        refreshRideRequests();
    } else if (sectionName === 'trip-history') {
        loadTripHistory();
    } else if (sectionName === 'earnings') {
        loadEarnings();
    }
}

let isOnline = false;

function toggleOnlineStatus() {
    isOnline = !isOnline;
    updateOnlineStatusUI();
    
    // ارسال وضعیت به سرور
    const token = localStorage.getItem('access_token');
    fetch(`${DRIVER_API_BASE}/driver/${currentDriverId}/status/`, {
        method: 'PATCH',
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ is_online: isOnline })
    }).catch(console.error);
}

function updateOnlineStatusUI() {
    const statusText = document.getElementById('online-status-text');
    const toggleBtn = document.getElementById('online-toggle-btn');
    
    if (isOnline) {
        statusText.innerHTML = '🟢 آنلاین';
        toggleBtn.classList.remove('text-gray-600', 'hover:bg-gray-50');
        toggleBtn.classList.add('text-green-600', 'bg-green-50');
    } else {
        statusText.innerHTML = '⚫ آفلاین';
        toggleBtn.classList.remove('text-green-600', 'bg-green-50');
        toggleBtn.classList.add('text-gray-600', 'hover:bg-gray-50');
    }
}

async function refreshRideRequests() {
    // دریافت درخواست‌های سفر از سرور
    const token = localStorage.getItem('access_token');
    const response = await fetch(`${DRIVER_API_BASE}/driver/${currentDriverId}/ride-requests/`, {
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
        }
    });
    
    const data = await response.json();
    const requestsList = document.getElementById('ride-requests-list');
    
    if (data.results && data.results.length > 0) {
        requestsList.innerHTML = data.results.map(ride => `
            <div class="border rounded-xl p-4 hover:shadow-lg transition">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded-lg text-xs">${ride.service_type}</span>
                            <span class="text-sm text-gray-500">${ride.distance} کیلومتر</span>
                        </div>
                        <p class="font-semibold">📍 مبدأ: ${ride.pickup_address}</p>
                        <p class="text-gray-600 mt-1">🏁 مقصد: ${ride.destination_address}</p>
                        <p class="text-sm text-gray-500 mt-2">💰 مبلغ: ${ride.price.toLocaleString()} تومان</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="acceptRide(${ride.id})" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                            ✓ قبول
                        </button>
                        <button onclick="rejectRide(${ride.id})" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                            ✗ رد
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    } else {
        requestsList.innerHTML = `
            <div class="text-center text-gray-500 py-8">
                <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"></path>
                </svg>
                <p>هیچ درخواست سفری وجود ندارد</p>
            </div>
        `;
    }
}

async function acceptRide(rideId) {
    const token = localStorage.getItem('access_token');
    const response = await fetch(`${DRIVER_API_BASE}/rides/${rideId}/accept/`, {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
        }
    });
    
    if (response.ok) {
        alert('سفر با موفقیت پذیرفته شد');
        refreshRideRequests();
        showDriverSection('active-ride');
        loadActiveRide();
    } else {
        alert('خطا در پذیرش سفر');
    }
}

function rejectRide(rideId) {
    // رد کردن درخواست سفر
    alert(`درخواست سفر شماره ${rideId} رد شد`);
}

async function loadTripHistory() {
    const token = localStorage.getItem('access_token');
    const response = await fetch(`${DRIVER_API_BASE}/driver/${currentDriverId}/rides/history/`, {
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
        }
    });
    
    const data = await response.json();
    const historyList = document.getElementById('trip-history-list');
    
    if (data.results && data.results.length > 0) {
        historyList.innerHTML = data.results.map(ride => `
            <div class="border rounded-xl p-4">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-semibold">${ride.pickup_address} → ${ride.destination_address}</p>
                        <p class="text-sm text-gray-500 mt-1">تاریخ: ${new Date(ride.created_at).toLocaleDateString('fa-IR')}</p>
                        <p class="text-sm text-gray-500">مبلغ: ${ride.price.toLocaleString()} تومان</p>
                    </div>
                    <div class="text-left">
                        <span class="px-2 py-1 ${ride.status === 'completed' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} rounded-lg text-xs">
                            ${ride.status === 'completed' ? 'انجام شده' : 'لغو شده'}
                        </span>
                    </div>
                </div>
            </div>
        `).join('');
    } else {
        historyList.innerHTML = `
            <div class="text-center text-gray-500 py-8">
                <p>هیچ سفری یافت نشد</p>
            </div>
        `;
    }
}

async function loadActiveRide() {
    const token = localStorage.getItem('access_token');
    const response = await fetch(`${DRIVER_API_BASE}/driver/${currentDriverId}/rides/active/`, {
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
        }
    });
    
    const data = await response.json();
    const activeRideContent = document.getElementById('active-ride-content');
    
    if (data.result) {
        activeRideContent.innerHTML = `
            <div class="border rounded-xl p-4">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="font-semibold">📍 مبدأ: ${data.result.pickup_address}</p>
                        <p class="text-gray-600 mt-1">🏁 مقصد: ${data.result.destination_address}</p>
                        <p class="text-sm text-gray-500 mt-2">💰 مبلغ: ${data.result.price.toLocaleString()} تومان</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startRide(${data.result.id})" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                            🚗 شروع سفر
                        </button>
                        <button onclick="completeRide(${data.result.id})" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                            ✓ پایان سفر
                        </button>
                    </div>
                </div>
            </div>
        `;
    } else {
        activeRideContent.innerHTML = `
            <div class="text-center text-gray-500 py-8">
                <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <p>هیچ سفری در حال انجام نیست</p>
            </div>
        `;
    }
}

async function loadEarnings() {
    const token = localStorage.getItem('access_token');
    const response = await fetch(`${DRIVER_API_BASE}/driver/${currentDriverId}/earnings/`, {
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
        }
    });
    
    const data = await response.json();
    
    if (data.result) {
        document.getElementById('earnings-today').innerText = data.result.today?.toLocaleString() || '0';
        document.getElementById('earnings-week').innerText = data.result.week?.toLocaleString() || '0';
        document.getElementById('earnings-month').innerText = data.result.month?.toLocaleString() || '0';
        document.getElementById('earnings-total').innerText = data.result.total?.toLocaleString() || '0';
        document.getElementById('stats-total-rides').innerText = data.result.total_rides || '0';
        document.getElementById('stats-canceled').innerText = data.result.canceled_rides || '0';
        document.getElementById('stats-rating').innerText = data.result.rating || '5.0';
        document.getElementById('stats-distance').innerText = data.result.total_distance || '0';
    }
}

async function updateCarInfo() {
    const token = localStorage.getItem('access_token');
    const carData = {
        name: document.getElementById('car-name').value,
        car_plate: document.getElementById('car-plate').value,
        car_color: document.getElementById('car-color').value,
    };
    
    const response = await fetch(`${DRIVER_API_BASE}/driver/${currentDriverId}/car/`, {
        method: 'PUT',
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(carData)
    });
    
    if (response.ok) {
        alert('اطلاعات خودرو با موفقیت به‌روزرسانی شد');
    } else {
        alert('خطا در به‌روزرسانی اطلاعات');
    }
}

function showRideRequestNotification(ride) {
    // نمایش اعلان درخواست سفر جدید
    if (Notification.permission === 'granted') {
        new Notification('درخواست سفر جدید', {
            body: `${ride.pickup_address} به ${ride.destination_address}`,
            icon: '/static/images/logo.png'
        });
    }
    
    // آپدیت تعداد درخواست‌ها در منو
    const badge = document.getElementById('request-badge');
    if (badge) {
        badge.classList.remove('hidden');
        const count = parseInt(badge.innerText) + 1 || 1;
        badge.innerText = count;
    }
}

// توابع کمکی
function goToProfile() {
    window.location.href = '/auth/profile/';
}

function logoutUser() {
    const token = localStorage.getItem('access_token');
    
    if (token) {
        // اگر توکن وجود داشت، آن را حذف کن
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        localStorage.removeItem('token_type');
        localStorage.removeItem('user');
    }
    
    // همیشه به صفحه اصلی هدایت کن
    // window.location.href = '/';
}

// درخواست مجوز اعلان
if (Notification.permission === 'default') {
    Notification.requestPermission();
}

// بارگذاری پنل
document.addEventListener('DOMContentLoaded', loadDriverPanel);
</script>
